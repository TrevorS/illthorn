<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' ws: wss:;">
    <title>Illthorn Dev Panel - Raw Game Logs</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 12px;
        background-color: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      .header {
        background-color: #2d2d30;
        border-bottom: 1px solid #3e3e42;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      
      .header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #cccccc;
        flex: 1;
      }
      
      .header input {
        background-color: #3c3c3c;
        color: #cccccc;
        border: 1px solid #555555;
        padding: 4px 8px;
        border-radius: 2px;
        font-size: 11px;
        font-family: inherit;
        flex: 1;
        max-width: 200px;
      }
      
      .header input:focus {
        outline: none;
        border-color: #0e639c;
      }
      
      .header input::placeholder {
        color: #888888;
      }
      
      .header button {
        background-color: #0e639c;
        color: white;
        border: none;
        padding: 4px 12px;
        border-radius: 2px;
        cursor: pointer;
        font-size: 11px;
        font-family: inherit;
      }
      
      .header button:hover {
        background-color: #1177bb;
      }
      
      .header button:active {
        background-color: #0d5795;
      }
      
      .header button.pinned {
        background-color: #d97706;
      }
      
      .header button.pinned:hover {
        background-color: #f59e0b;
      }
      
      .logs-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        font-family: inherit;
      }
      
      .log-entry {
        margin-bottom: 16px;
        border-bottom: 1px solid #3e3e42;
        padding-bottom: 8px;
      }
      
      .log-entry:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }
      
      .log-header {
        font-size: 10px;
        color: #6a9955;
        margin-bottom: 4px;
        font-weight: 600;
      }
      
      .log-data {
        background-color: #252526;
        border: 1px solid #3e3e42;
        border-radius: 3px;
        padding: 8px;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: inherit;
        line-height: 1.4;
        max-height: 400px;
        overflow-y: auto;
      }
      
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #858585;
        font-size: 13px;
      }
      
      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.3;
      }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: #1e1e1e;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #424242;
        border-radius: 6px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #4f4f4f;
      }
      
      /* XML syntax highlighting */
      .xml-tag {
        color: #569cd6;
      }
      
      .xml-attr {
        color: #9cdcfe;
      }
      
      .xml-value {
        color: #ce9178;
      }
      
      .xml-comment {
        color: #6a9955;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Raw Game Logs</h1>
      <input id="filter-input" type="text" placeholder="Filter (regex)...">
      <button id="pin-button" type="button">📌</button>
      <button id="copy-button" type="button">📋</button>
      <button id="clear-button" type="button">Clear</button>
    </div>
    
    <div class="logs-container" id="logs-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">📄</div>
        <div>No game data received yet</div>
        <div style="margin-top: 4px; font-size: 11px; color: #666;">Raw XML data will appear here when you interact with the game</div>
      </div>
    </div>
    
    <script type="module" src="./dev-panel.ts"></script>
  </body>
</html>
